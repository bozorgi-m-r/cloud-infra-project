apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-app
  template:
    metadata:
      labels:
        app: resume-app
    spec:
      containers:
      - name: web-container
        image: productionacr001.azurecr.io/web-app:latest
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: acr-secret